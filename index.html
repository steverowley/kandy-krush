<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fffbeb" />
  <title>Sweet Match</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body class="min-h-screen bg-amber-50 text-gray-900 flex flex-col items-center px-2 py-3 sm:p-6 gap-4 sm:gap-6">
  <header class="w-full max-w-3xl flex items-center justify-between gap-4">
    <h1 class="text-4xl sm:text-5xl font-bold tracking-tight">Sweet Match</h1>
    <button
      id="restart"
      type="button"
      class="text-xl sm:text-2xl font-bold bg-yellow-300 hover:bg-yellow-200 active:bg-yellow-400 border-[3px] border-black rounded-2xl px-5 py-3 shadow-md focus:outline-none focus-visible:ring-4 focus-visible:ring-pink-500"
      aria-label="Start over"
    >Start Over</button>
  </header>

  <section class="w-full max-w-3xl flex items-end justify-between gap-4" aria-live="polite">
    <div>
      <div class="text-2xl sm:text-3xl font-bold">Score</div>
      <div id="score" class="text-5xl sm:text-7xl font-bold tabular-nums leading-none">0</div>
    </div>
    <div id="message" class="text-2xl sm:text-4xl font-bold text-pink-700 min-h-[1.5em] text-right"></div>
  </section>

  <main
    id="board"
    class="grid grid-cols-6 gap-2 sm:gap-3 bg-white p-3 sm:p-4 rounded-3xl border-[3px] border-black shadow-xl select-none touch-manipulation"
    role="grid"
    aria-label="Sweet Match board"
  ></main>

  <footer class="text-base sm:text-lg text-gray-600 max-w-3xl text-center">
    Tap a candy, then tap one next to it to swap. Match three or more in a row.
  </footer>

  <script type="module" src="src/main.js"></script>
</body>
</html>
